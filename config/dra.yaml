# VectorCore DRA - full configuration example
# Copy to config.yaml and adjust for your network.
# Sections under "mutable config" are hot-reloaded when the file changes on disk
# and can also be managed live via the REST API (/api/v1/...).

# ---------------------------------------------------------------------------
# DRA identity
# ---------------------------------------------------------------------------
dra:
  identity: "dra.epc.mnc435.mcc311.3gppnetwork.org"
  realm: "epc.mnc435.mcc311.3gppnetwork.org"

# ---------------------------------------------------------------------------
# Listeners - all entries start concurrently at startup.
# address: "0.0.0.0" = IPv4 wildcard, "::" = IPv4+IPv6 dual-stack
# ---------------------------------------------------------------------------
listeners:
  - transport: tcp
    address: "0.0.0.0"
    port: 3868

  - transport: sctp
    address: "0.0.0.0"
    port: 3868

  - transport: tcp+tls
    address: "0.0.0.0"
    port: 5868

  - transport: sctp+tls
    address: "0.0.0.0"
    port: 5868

# ---------------------------------------------------------------------------
# TLS - one certificate shared by ALL TLS listeners (tcp+tls and sctp+tls).
# ---------------------------------------------------------------------------
tls:
  cert: /etc/vectorcore-dra/server.crt
  key:  /etc/vectorcore-dra/server.key
  ca:   /etc/vectorcore-dra/ca.crt    # CA bundle for peer cert verification; omit to use system roots

# ---------------------------------------------------------------------------
# Management API
# Docs: http://<host>:8080/api/v1/docs
# ---------------------------------------------------------------------------
api:
  address: "0.0.0.0"
  port: 8080

# ---------------------------------------------------------------------------
# Logging
# Normal mode: file only at logging.file, level from logging.level.
# Debug mode (-d flag): forces debug level, writes to file AND console.
# ---------------------------------------------------------------------------
logging:
  level: info          # debug | info | warn | error
  file: log/dra.log

# ---------------------------------------------------------------------------
# Watchdog - DWR/DWA per RFC 6733 5.5
# ---------------------------------------------------------------------------
watchdog:
  interval_seconds: 30
  max_failures: 3

# ---------------------------------------------------------------------------
# Reconnect backoff - applies to active peers only.
# Exponential: initial -> initial*2 -> ... -> max, reset on successful CER/CEA.
# ---------------------------------------------------------------------------
reconnect:
  initial_backoff_seconds: 1
  max_backoff_seconds: 60

# ---------------------------------------------------------------------------
# --- mutable config - hot-reloaded on file change, managed via REST API ---
# ---------------------------------------------------------------------------

# LB Groups (optional)
# Only needed to set a non-default policy. Groups referenced in peers or routes
# but not listed here are created automatically with round_robin when a peer joins.
# Managed via: GET/POST /api/v1/lb-groups, PATCH/DELETE /api/v1/lb-groups/{name}
lb_groups:
  - name: hss_group
    lb_policy: round_robin    # round_robin | least_conn

  - name: pcrf_group
    lb_policy: least_conn

  - name: roaming_ipe
    lb_policy: round_robin

# Peers
# address: IP address or FQDN. FQDNs are resolved via DNS on each connect attempt.
# mode:
#   active  - DRA initiates the TCP/SCTP connection and sends CER.
#             Reconnects automatically using the reconnect backoff.
#   passive - DRA waits for the peer to connect and responds with CEA.
#             No reconnect - peer must re-initiate after disconnect.
# lb_group: optional - assigns this peer to a named load-balancing group.
# Security: only IPs listed here are accepted inbound. Unknown sources are dropped at accept.
# Managed via: GET/POST /api/v1/peers, PATCH/DELETE /api/v1/peers/{name}
peers:
  - name: hss01
    fqdn: hss01.epc.mnc435.mcc311.3gppnetwork.org
    address: 10.0.0.10        # IP address preferred; FQDN also accepted (DNS resolved per attempt)
    port: 3868
    transport: tcp            # tcp | tcp+tls | sctp | sctp+tls
    mode: active              # active = we connect | passive = they connect to us
    realm: epc.mnc435.mcc311.3gppnetwork.org
    lb_group: hss_group
    enabled: true

  - name: hss02
    fqdn: hss02.epc.mnc435.mcc311.3gppnetwork.org
    address: 10.0.0.11
    port: 3868
    transport: tcp
    mode: active
    realm: epc.mnc435.mcc311.3gppnetwork.org
    lb_group: hss_group
    enabled: true

  - name: pcrf01
    fqdn: pcrf01.epc.mnc435.mcc311.3gppnetwork.org
    address: 10.0.1.10
    port: 3868
    transport: sctp
    mode: active
    realm: epc.mnc435.mcc311.3gppnetwork.org
    lb_group: pcrf_group
    enabled: true

  - name: mme01
    fqdn: mme01.epc.mnc435.mcc311.3gppnetwork.org
    address: 10.0.2.10
    port: 3868
    transport: tcp
    mode: passive             # MME connects to us; we respond with CEA
    realm: epc.mnc435.mcc311.3gppnetwork.org
    enabled: true

  - name: tmobile-ipe
    fqdn: dra.mnc260.mcc310.3gppnetwork.org
    address: dra.mnc260.mcc310.3gppnetwork.org   # FQDN - resolved via DNS on each connect
    port: 3868
    transport: tcp+tls
    mode: active
    realm: mnc260.mcc310.3gppnetwork.org
    lb_group: roaming_ipe
    enabled: true

# IMSI prefix routing - evaluated BEFORE route_rules. Longest prefix wins.
# Extracts IMSI from Subscription-Id AVP (Gx/Gy) or User-Name AVP (S6a/SWx).
# On match: overwrites Destination-Realm and routes to the named lb_group.
#
# prefix: MCC+MNC digits only - 5 digits (2-digit MNC) or 6 digits (3-digit MNC).
#   311435  -> MCC=311 MNC=435
#   310260  -> MCC=310 MNC=260
#   20416   -> MCC=204 MNC=16 (note: 5 digits, leading zero dropped)
#
# dest_realm: the 3GPP realm for that network per TS 23.003:
#   epc.mnc<MNC3>.mcc<MCC>.3gppnetwork.org   (MNC zero-padded to 3 digits)
#
# lb_group: optional - if omitted, implicit realm routing selects the peer.
# Managed via: GET/POST /api/v1/imsi-routes, PUT/DELETE /api/v1/imsi-routes/{index}
imsi_routes:
  - prefix: "311435"              # home: MCC=311 MNC=435
    dest_realm: "epc.mnc435.mcc311.3gppnetwork.org"
    lb_group: hss_group
    priority: 10

  - prefix: "310260"              # T-Mobile US - roaming partner
    dest_realm: "epc.mnc260.mcc310.3gppnetwork.org"
    lb_group: roaming_ipe
    priority: 10

  - prefix: "20416"               # T-Mobile NL - 5-digit prefix (MCC=204 MNC=16)
    dest_realm: "epc.mnc016.mcc204.3gppnetwork.org"
    lb_group: roaming_ipe
    priority: 10

# Route rules - OPTIONAL. Evaluated after IMSI routes.
#
# You do NOT need route_rules for normal operation. The DRA automatically routes
# Destination-Realm to any OPEN peer whose realm matches - exactly like freeDiameter's
# default behaviour. Peers advertise their realm in CER; the router uses that.
#
# Add route_rules only for:
#   - Explicit rejects (block a realm or application)
#   - Overriding which peer group handles a specific realm+app combination
#     (e.g. Gx to PCRF group, S6a to HSS group, when both share the same realm)
#   - A catch-all default action for unmatched traffic
#
# priority: lower number = evaluated first
# dest_realm: "" = wildcard; dest_host: "" = wildcard; app_id: 0 = any
# dest_host: target peer FQDN to route to (takes precedence over lb_group)
# lb_group: target group for load-balanced routing
# action: route | reject | drop
# Managed via: GET/POST /api/v1/routes, PUT/DELETE /api/v1/routes/{index}
#
# route_rules:
#   - priority: 20
#     dest_realm: epc.mnc435.mcc311.3gppnetwork.org
#     app_id: 16777238          # Gx only -> route to PCRF group
#     lb_group: pcrf_group
#     action: route
#
#   - priority: 50
#     dest_realm: blocked.example.com
#     action: reject
#
#   - priority: 100
#     action: reject            # catch-all: reject anything unmatched
